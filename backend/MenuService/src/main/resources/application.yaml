spring:
  application:
    name: MenuService
  jmx:
    enabled: false

  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://mike:secret@localhost:27018/menu_db?authSource=admin}
    database: ${SPRING_MONGODB_DATABASE:menu_db}

server:
  port: 8084

logging:
