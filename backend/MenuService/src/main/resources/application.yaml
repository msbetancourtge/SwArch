spring:
  application:
    name: MenuService
  jmx:
    enabled: false

  mongodb:
    uri: ${SPRING_MONGODB_URI}
    database: ${SPRING_MONGODB_DATABASE:menu_db}

server:
  port: 8084

logging:
  level:
    root: INFO
    org.springframework.data.mongodb: DEBUG

restaurant:
  service:
    url: ${RESTAURANT_SERVICE_URL:http://localhost:8082}

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}