events {}

http {
    # 1. Global Rate Limit (Tracks everything together using a static string 'global')
    # Shared memory zone of 1MB is plenty for a single static key.
    limit_req_zone "global" zone=global_limit:1m rate=1000r/s;

    # 2. Define the throttling zone (Leaky Bucket) for IP-based rate limiting
    # Allocates 10MB of memory to track IP addresses.
    # Limits requests to 5 per second per IP.
    limit_req_zone $binary_remote_addr zone=menu_limit:10m rate=15r/s;

    upstream menu_service {
        server menuservice:8084;
    }

    server {
        listen 80;

        location / {
            # Apply the Global Limit (allows brief spikes up to 100)
            limit_req zone=global_limit burst=100 nodelay;

            # Apply the throttling zone to this route
            # burst=10 allows brief spikes of up to 10 requests.
            # nodelay ensures those burst requests are processed immediately, not delayed.
            limit_req zone=menu_limit burst=10 nodelay;

            set $menu_service http://menuservice:8084;
            proxy_pass $menu_service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
