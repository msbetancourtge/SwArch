# Test-only configuration. Contains NO production secrets.
# Values here exist solely so the Spring context can start during tests.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

jwt:
  secret: "test-only-jwt-secret-not-used-in-production-0123456789"
