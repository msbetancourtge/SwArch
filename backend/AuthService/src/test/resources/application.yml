# Test-only configuration. Contains NO production secrets.
# Uses H2 in-memory database so tests run hermetically without Docker.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: "test-only-jwt-secret-not-used-in-production-0123456789"

app:
  seed:
    enabled: false
