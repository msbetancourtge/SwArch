spring:
  application:
    name: AuthService
  jmx:
    enabled: false

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  data:
    jdbc:
      dialect: postgresql

jwt:
  secret: ${JWT_SECRET}

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
    password: ${APP_SEED_PASSWORD:Password123!}

server:
  port: 8081

logging:
  level:
    root: INFO
    org.springframework.jdbc.core: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health
    jmx:
      exposure:
        exclude: "*"

