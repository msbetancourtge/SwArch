apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notification-db
  namespace: clickmunch
  labels:
    app: notification-db
    tier: database
spec:
  serviceName: notification-db
  replicas: 1
  selector:
    matchLabels:
      app: notification-db
  template:
    metadata:
      labels:
        app: notification-db
        tier: database
    spec:
      containers:
        - name: postgres
          image: docker.io/bitnami/postgresql:latest
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: notification_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: clickmunch-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickmunch-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: notification-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "notification_db"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "notification_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: notification-data
          persistentVolumeClaim:
            claimName: notification-db-pvc
