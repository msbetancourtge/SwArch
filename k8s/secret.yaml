# ─────────────────────────────────────────────────────────────────────────────
# DO NOT commit real credentials here. Use the helper script instead:
#
#   ./k8s/scripts/create-secret.sh
#
# That script reads from backend/.env and creates the secret automatically.
# The template below uses base64-encoded PLACEHOLDER values only.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: clickmunch-secrets
  namespace: clickmunch
type: Opaque
data:
  # echo -n "devuser"     | base64  →  ZGV2dXNlcg==
  POSTGRES_USER:     ZGV2dXNlcg==
  # echo -n "devpassword" | base64  →  ZGV2cGFzc3dvcmQ=
  POSTGRES_PASSWORD: ZGV2cGFzc3dvcmQ=
  # The JWT_SECRET value from backend/.env is already base64-encoded by jjwt.
  # Base64-encode it once MORE for the K8s secret data field:
  # echo -n "Y2xpY2tBbmRNdW5jaERldlNlY3JldEtleTIwMjYhISE=" | base64
  JWT_SECRET: WTJacFkydEJiazFqYUVSbFZsTmxZM0psZEV0bFdUSXdNallpSVNFaA==
